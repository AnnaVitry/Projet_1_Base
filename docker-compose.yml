services:
  db:
    image: postgres:15-alpine
    container_name: toolbox_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: toolbox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - toolbox-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d toolbox_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .  # IMPORTANT : On définit la RACINE comme contexte
      dockerfile: app_api/Dockerfile # On pointe vers le Dockerfile spécifique
    container_name: toolbox_api
    depends_on:
      db:
        condition: service_healthy # L'API attend que la DB soit vraiment prête
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/toolbox_db
    ports:
      - "8000:8000"
    networks:
      - toolbox-net

  front:
    build:
      context: .
      dockerfile: app_front/Dockerfile
    container_name: toolbox_front
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    networks:
      - toolbox-net

networks:
  toolbox-net:

volumes:
  postgres_data: